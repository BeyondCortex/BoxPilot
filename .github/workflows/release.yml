name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v0.1.0). Required for manual runs.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-deb:
    name: Build .deb (amd64)
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve target tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout tag ${{ steps.tag.outputs.tag }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}
          fetch-depth: 0

      - name: Install Rust toolchain (rustup, stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install build dependencies (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            debhelper \
            devscripts

      - name: Show toolchain versions
        run: |
          rustc --version
          cargo --version
          node --version
          npm --version
          dpkg-buildpackage --version | head -1
          dh --version | head -1

      - name: Build .deb
        # -d skips dpkg-checkbuilddeps because we provide rustc/cargo via
        # rustup rather than apt's `cargo` package, which on noble is older
        # than the >= 1.78 declared in debian/control's Build-Depends.
        run: dpkg-buildpackage -b -uc -us -d

      - name: Stage build output inside workspace
        # actions/upload-artifact rejects '..' in path globs, so copy the
        # dpkg-buildpackage outputs (which land in the parent dir) into
        # ./dist/ inside the workspace before any later step references them.
        run: |
          mkdir -p dist
          cp ../boxpilot_*.deb dist/
          ls -la dist/

      - name: Upload .deb to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          DEB=$(ls dist/boxpilot_*.deb | head -n 1)
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$REPO" --generate-notes
          fi
          gh release upload "$TAG" "$DEB" --repo "$REPO" --clobber

      - name: Archive .deb as workflow artifact (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: boxpilot-deb-${{ steps.tag.outputs.tag }}
          path: dist/boxpilot_*.deb
          if-no-files-found: error
          retention-days: 30
