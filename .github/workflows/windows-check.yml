name: windows-check
on:
  pull_request:
  push:
    branches: [main, "feat/**"]

jobs:
  cargo-check-windows-msvc:
    name: cargo check (x86_64-pc-windows-msvc)
    runs-on: windows-latest
    # Sub-project #2 batch ① widens the Windows compile gate to all
    # cross-platform-by-design library crates: boxpilot-ipc,
    # boxpilot-platform, and boxpilot-profile. boxpilotd batch ① pieces
    # already done (iface.rs/credentials.rs cfg-gates, CurrentPointer
    # trait, legacy/backup.rs FsPermissions); the remaining boxpilotd
    # Windows-compile sweep (cfg-gating boxpilot_platform::linux::*
    # consumers, std::os::unix/fd users, nix::sys consumers, the rest of
    # the profile/* and core/trust unix code paths) is deferred to a
    # dedicated sweep PR (or rolled into batch ② setup). The Tauri shell
    # (`boxpilot` package) is excluded: tauri-build requires
    # `icons/icon.ico` for Windows resources, which is Sub-project #3's
    # installer/asset scope.
    #
    # `cargo test --workspace` lands once batch ③'s real Windows
    # ServiceManager + ActivePointer impls are in place.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-msvc
      - name: cargo check (x86_64-pc-windows-msvc) — cross-platform lib crates
        run: cargo check --target x86_64-pc-windows-msvc -p boxpilot-ipc -p boxpilot-platform -p boxpilot-profile --all-targets
      - name: cargo test (boxpilot-ipc + boxpilot-platform)
        run: cargo test --target x86_64-pc-windows-msvc -p boxpilot-ipc -p boxpilot-platform --no-fail-fast
